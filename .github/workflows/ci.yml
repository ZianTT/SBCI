name: CI

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-15-intel, macos-latest]
        # os: [windows-latest, ubuntu-latest, macos-15-intel, macos-latest, windows-11-arm]
        include:
          - os: windows-latest
            build: BHYG-Windows.exe
          - os: ubuntu-latest
            build: BHYG-Linux
          - os: macos-15-intel
            build: BHYG-macOS-Intel
          - os: macos-latest
            build: BHYG-macOS-Apple_Silicon
          # - os: windows-11-arm
          #   build: BHYG-Windows-arm.exe
    runs-on: ${{ matrix.os }}
    env:
      version: ${{ github.ref_name }}
    steps:
      - name: Checkout
        run: |
          git clone https://ZianTT:${{ secrets.SBCI_TOKEN }}@git.origami.pub/LightXi-BHYG/SB

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./SB

      - name: Install Cython
        run: pip install Cython
        working-directory: ./SB

      - name: Build Binary
        run: python -m nuitka loader.py  --standalone --onefile --static-libpython=no --output-filename=${{ github.ref_name }}-${{ matrix.build }}
        working-directory: ./SB

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ matrix.build }}
          path: SB/${{ github.ref_name }}-${{ matrix.build }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: SB/dist/${{ github.ref_name }}-${{ matrix.build }}
